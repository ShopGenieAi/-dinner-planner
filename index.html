<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Dinner — Mark & Allie</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f2f5;
  --white: #ffffff;
  --border: rgba(0,0,0,0.09);
  --border2: rgba(0,0,0,0.14);
  --text: #111827;
  --muted: #6b7280;
  --dim: #9ca3af;
  --mark: #3b82f6;
  --allie: #ec4899;
  --safe-t: env(safe-area-inset-top, 0px);
  --safe-b: env(safe-area-inset-bottom, 20px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

/* ─── HEADER ─── */
.hdr {
  position:sticky; top:0; z-index:200;
  padding:calc(var(--safe-t) + 14px) 18px 12px;
  background:rgba(240,242,245,0.94);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.hdr-inner { display:flex; align-items:center; justify-content:space-between; }
.hdr-left h1 { font-family:'Playfair Display',serif; font-size:21px; color:var(--text); letter-spacing:-.3px; }
.hdr-left p  { font-size:11px; color:var(--muted); margin-top:1px; font-weight:400; }
.today-badge {
  padding:5px 12px; border-radius:100px;
  background:var(--white); border:1px solid var(--border2);
  font-size:11px; font-weight:700; color:var(--text);
  box-shadow:0 1px 3px rgba(0,0,0,.08);
}

/* ─── DAY STRIP ─── */
.days-outer { overflow-x:auto; scrollbar-width:none; padding:12px 16px 8px; }
.days-outer::-webkit-scrollbar { display:none; }
.days-row { display:flex; gap:8px; min-width:max-content; }

.day-btn {
  display:flex; flex-direction:column; align-items:center;
  padding:9px 13px; border-radius:14px;
  border:1.5px solid var(--border);
  background:var(--white);
  cursor:pointer; transition:all .18s;
  font-family:'Outfit',sans-serif;
  box-shadow:0 1px 3px rgba(0,0,0,.05);
}
.day-btn:active { transform:scale(.94); }
.day-short { font-size:12px; font-weight:700; color:#888; letter-spacing:.5px; text-transform:uppercase; }
.day-num   { font-size:10px; font-weight:500; color:#bbb; margin-top:2px; }
.day-dot   { width:4px; height:4px; border-radius:50%; margin-top:4px; background:transparent; transition:all .2s; }
.day-btn.today .day-short { color:var(--text); }
.day-btn.today .day-dot   { background:#f97316; }
.day-btn.active { border-color:var(--text); background:var(--text); }
.day-btn.active .day-short { color:#fff; }
.day-btn.active .day-num   { color:rgba(255,255,255,.5); }
.day-btn.active .day-dot   { background:rgba(255,255,255,.6); }

/* ─── MEAL PICKER ─── */
.picker-outer { padding:2px 16px 10px; }
.picker-scroll { overflow-x:auto; scrollbar-width:none; }
.picker-scroll::-webkit-scrollbar { display:none; }
.picker-row { display:flex; gap:7px; min-width:max-content; padding-bottom:2px; }

.meal-chip {
  display:flex; align-items:center; gap:6px;
  padding:7px 13px; border-radius:100px;
  border:1.5px solid var(--border);
  background:var(--white);
  cursor:pointer; transition:all .18s;
  font-family:'Outfit',sans-serif;
  font-size:12px; font-weight:600; color:#555;
  white-space:nowrap;
  box-shadow:0 1px 3px rgba(0,0,0,.05);
}
.meal-chip:active { transform:scale(.95); }
.meal-chip.active { border-color:var(--text); background:var(--text); color:#fff; }
.meal-chip-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }

/* ─── MAIN ─── */
.main { padding:0 14px calc(var(--safe-b) + 20px); }
.card-wrap { max-width:480px; margin:0 auto; }

/* ─── HERO CARD ─── */
.hero-card {
  border-radius:22px; overflow:hidden;
  border:1px solid var(--border2);
  background:var(--white);
  box-shadow:0 4px 24px rgba(0,0,0,.10);
  animation:cardIn .3s cubic-bezier(.2,0,.2,1);
}
@keyframes cardIn {
  from { opacity:0; transform:translateY(16px) scale(.98); }
  to   { opacity:1; transform:translateY(0)    scale(1); }
}

/* ─── MEAL IMAGE BANNER ─── */
.meal-img-wrap {
  position:relative; height:180px; overflow:hidden;
  background:linear-gradient(135deg,#e5e7eb,#d1d5db);
}
.meal-img {
  width:100%; height:100%; object-fit:cover;
  transition:transform .4s ease;
}
.meal-img-wrap:active .meal-img { transform:scale(1.03); }
.meal-img-overlay {
  position:absolute; inset:0;
  background:linear-gradient(180deg, transparent 30%, rgba(0,0,0,.65) 100%);
}
.meal-img-content {
  position:absolute; bottom:0; left:0; right:0;
  padding:14px 18px;
}
.meal-tag {
  display:inline-flex; align-items:center;
  padding:3px 10px; border-radius:100px; margin-bottom:7px;
  background:rgba(255,255,255,.2);
  border:1px solid rgba(255,255,255,.3);
  font-size:10px; font-weight:700; letter-spacing:1px;
  text-transform:uppercase; color:rgba(255,255,255,.9);
  backdrop-filter:blur(8px);
}
.meal-title {
  font-family:'Playfair Display',serif;
  font-size:22px; line-height:1.15; color:#fff;
  text-shadow:0 2px 12px rgba(0,0,0,.4);
}
.meal-sub {
  font-size:12px; color:rgba(255,255,255,.7);
  margin-top:3px; font-weight:300; font-style:italic;
}

/* ─── CHEF'S TIP ─── */
.cook-tip {
  padding:13px 18px;
  background:#fffbf0;
  border-bottom:1px solid #fde68a;
  display:flex; align-items:flex-start; gap:10px;
}
.tip-icon { font-size:20px; flex-shrink:0; margin-top:0; }
.tip-label { font-size:11px; text-transform:uppercase; letter-spacing:1px; font-weight:800; color:#92400e; margin-bottom:3px; }
.tip-body  { font-size:13px; color:#78350f; font-weight:600; line-height:1.5; }

/* ─── INGREDIENTS ─── */
.ing-section { background:var(--white); }
.ing-hd {
  padding:12px 18px 6px;
  font-size:11px; text-transform:uppercase; letter-spacing:2px;
  color:#374151; font-weight:800; border-bottom:1px solid var(--border);
}
.ing-row {
  padding:10px 18px;
  display:flex; justify-content:space-between; align-items:flex-start; gap:12px;
}
.ing-name { flex:1; font-size:14px; color:#1f2937; line-height:1.35; font-weight:600; }
.ing-name strong { font-weight:800; }
.ing-only { display:block; font-size:10px; color:#9ca3af; margin-top:1px; font-weight:500; }
.ing-qty  { flex-shrink:0; display:flex; flex-direction:column; align-items:flex-end; gap:3px; }
.qty { font-size:14px; font-weight:700; white-space:nowrap; }
.qty.m { color:var(--mark); }
.qty.a { color:var(--allie); }

/* ─── RAW/COOKED BLOCK ─── */
.rc-wrap {
  margin:2px 14px 8px 16px;
  border-radius:0 12px 12px 0;
  border-left:3px solid var(--rc-color, #f97316);
  background:#fafafa;
  overflow:hidden;
}
.rc-head {
  padding:6px 14px 5px;
  font-size:10px; text-transform:uppercase; letter-spacing:1px;
  font-weight:800; color:var(--rc-color, #f97316);
}
.rc-row {
  padding:6px 14px 7px;
  display:flex; justify-content:space-between; align-items:center;
  border-top:1px solid rgba(0,0,0,.05);
}
.rc-who  { font-size:12px; color:#555; font-weight:600; }
.rc-right { text-align:right; }
.rc-raw  { font-size:13px; font-weight:800; display:block; }
.rc-raw.m { color:var(--mark); }
.rc-raw.a { color:var(--allie); }
.rc-cooked { font-size:12px; color:#555; display:block; font-weight:700; }

.sep { height:1px; background:#f3f4f6; margin:0 18px; }

/* ─── TOTALS — rock solid table layout ─── */
.totals-bar {
  padding:14px 14px 16px;
  background:#f9fafb;
  border-top:2px solid var(--border);
}
.totals-title {
  font-size:10px; text-transform:uppercase; letter-spacing:1.5px;
  font-weight:800; color:#6b7280; margin-bottom:10px; padding:0 2px;
}
.totals-grid {
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr;
  gap:8px;
  width:100%;
}
.tot {
  background:var(--white);
  border:1.5px solid var(--border);
  border-radius:12px;
  padding:10px 6px 8px;
  text-align:center;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
  overflow:hidden;
  position:relative;
}
.tot-stripe {
  position:absolute; top:0; left:0; right:0; height:3px;
}
.tot.mk .tot-stripe { background:linear-gradient(90deg,var(--mark),rgba(59,130,246,.2)); }
.tot.al .tot-stripe { background:linear-gradient(90deg,var(--allie),rgba(236,72,153,.2)); }
.tot-val { font-size:16px; font-weight:800; line-height:1; margin-top:2px; }
.tot-val.m { color:var(--mark); }
.tot-val.a { color:var(--allie); }
.tot-lbl { font-size:9px; color:#6b7280; margin-top:4px; font-weight:700; text-transform:uppercase; letter-spacing:.3px; line-height:1.3; }

/* ─── EMPTY STATE ─── */
.empty { text-align:center; padding:70px 30px; max-width:480px; margin:0 auto; }
.empty-icon { font-size:60px; display:block; margin-bottom:16px; }
.empty h2 { font-family:'Playfair Display',serif; font-size:22px; margin-bottom:8px; }
.empty p  { font-size:14px; color:var(--muted); font-weight:400; line-height:1.6; }

.fn { text-align:center; padding:10px 0 4px; font-size:10px; color:#bbb; font-style:italic; max-width:480px; margin:0 auto; }
</style>
</head>

    tip:{icon:'🌮', text:'Toast empty tortillas in dry pan until crispy. Fill and eat straight away!'},
    ings:[
      {n:'Wholemeal tortillas (24g each)', m:'2 (48g)', a:'2 (48g)'},
      {n:'Chicken breast (cooked, sliced)', m:'150g cooked', a:'120g cooked'},
      {n:'Reduced fat cheese (grated)',    m:'20g', a:'15g'},
      {n:'Capsicum (sliced)',              m:'40g', a:'40g'},
      {n:'Spinach',                        m:'20g', a:'20g'},
      {n:'Tomato (diced)',                 m:'30g', a:'30g'},
      {n:'Greek yoghurt (topping)',        m:'30g', a:'30g'},
    ]
  },
};

const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const PLAN = {
  Monday:    {def:'Chicken Mince + Rice',                         opts:['Chicken Mince + Rice','Mediterranean Chicken','Slow Cook Roast Beef','Baked Chicken Risotto','Tortilla Boats']},
  Tuesday:   {def:'Roast Chicken + Air Fry Potatoes + Salad',     opts:['Roast Chicken + Air Fry Potatoes + Salad','Mediterranean Chicken','Slow Cook Roast Beef','Baked Chicken Risotto','Tortilla Boats']},
  Wednesday: {def:'Chicken Stir Fry + Soba Noodles',              opts:['Chicken Stir Fry + Soba Noodles','Mediterranean Chicken','Slow Cook Roast Beef','Baked Chicken Risotto','Tortilla Boats']},
  Thursday:  {def:'Scrambled Eggs + Sourdough',                   opts:['Scrambled Eggs + Sourdough','Egg Wrap','Eggs + Smashed Avo','Mediterranean Chicken','Slow Cook Roast Beef','Baked Chicken Risotto','Tortilla Boats']},
  Friday:    {def:'Chicken Mince + Rice',                         opts:['Chicken Mince + Rice','Mediterranean Chicken','Slow Cook Roast Beef','Baked Chicken Risotto','Tortilla Boats']},
  Saturday:  {def:'Roast Chicken + Corn, Beans & Carrot',         opts:['Roast Chicken + Corn, Beans & Carrot','Mediterranean Chicken','Slow Cook Roast Beef','Baked Chicken Risotto','Tortilla Boats']},
  Sunday:    {def:'Scrambled Eggs + Sourdough',                   opts:['Scrambled Eggs + Sourdough','Egg Wrap','Eggs + Smashed Avo','Mediterranean Chicken','Slow Cook Roast Beef','Baked Chicken Risotto','Tortilla Boats']},
};

const TODAY = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()];
let curDay = null, curMeal = null;

function buildDays() {
  // Calculate Monday of current week
  const now = new Date();
  const dayOfWeek = now.getDay(); // 0=Sun
  const mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
  const monday = new Date(now);
  monday.setDate(now.getDate() + mondayOffset);

  document.getElementById('daysRow').innerHTML = DAYS.map((d, i) => {
    const date = new Date(monday);
    date.setDate(monday.getDate() + i);
    const dn = date.getDate();
    return `<button class="day-btn${d===TODAY?' today':''}" onclick="pickDay('${d}')">
      <span class="day-short">${d.slice(0,3)}</span>
      <span class="day-num">${dn}</span>
      <span class="day-dot"></span>
    </button>`;
  }).join('');

  document.getElementById('todayBadge').textContent = TODAY;
  document.getElementById('subline').textContent = "What's for dinner tonight?";
}

function pickDay(d) {
  curDay = d;
  curMeal = PLAN[d].def;
  document.querySelectorAll('.day-btn').forEach((el,i) => el.classList.toggle('active', DAYS[i]===d));
  document.querySelectorAll('.day-btn')[DAYS.indexOf(d)]?.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  document.getElementById('pickerOuter').style.display = 'block';
  buildPicker();
  buildCard();
}

function buildPicker() {
  const opts = PLAN[curDay].opts;
  document.getElementById('pickerRow').innerHTML = opts.map(o => {
    const col = COLOURS[o] || '#888';
    const short = o.length > 24 ? o.split(' ').slice(0,3).join(' ')+'…' : o;
    return `<button class="meal-chip${o===curMeal?' active':''}" onclick="pickMeal('${o.replace(/'/g,"\\'")}')">
      <span class="meal-chip-dot" style="background:${o===curMeal?'rgba(255,255,255,0.8)':col}"></span>
      ${M[o].e} ${short}
    </button>`;
  }).join('');
}

function pickMeal(meal) { curMeal = meal; buildPicker(); buildCard(); }

function buildCard() {
  const m = M[curMeal];
  if (!m) return;
  const col = COLOURS[curMeal] || '#f97316';
  const img = IMGS[curMeal] || '';

  let ings = '';
  m.ings.forEach((ing, i) => {
    if (i > 0) ings += '<div class="sep"></div>';
    if (ing.rc) {
      ings += `
        <div class="ing-row"><div class="ing-name"><strong>${ing.n}</strong></div></div>
        <div class="rc-wrap" style="--rc-color:${col}">
          <div class="rc-head">⚖ Weigh raw — serve as cooked</div>
          <div class="rc-row">
            <span class="rc-who">💙 Mark</span>
            <div class="rc-right">
              <span class="rc-raw m">${ing.mr}</span>
              <span class="rc-cooked">${ing.mc}</span>
            </div>
          </div>
          <div class="rc-row">
            <span class="rc-who">💗 Allie</span>
            <div class="rc-right">
              <span class="rc-raw a">${ing.ar}</span>
              <span class="rc-cooked">${ing.ac}</span>
            </div>
          </div>
        </div>`;
    } else {
      const tag = ing.mo ? `<span class="ing-only">💙 Mark only</span>`
                : ing.ao ? `<span class="ing-only">💗 Allie only</span>` : '';
      const mq = ing.m && !ing.ao ? `<span class="qty m">💙 ${ing.m}</span>` : '';
      const aq = ing.a && !ing.mo ? `<span class="qty a">💗 ${ing.a}</span>` : '';
      ings += `<div class="ing-row">
        <div class="ing-name">${ing.n}${tag}</div>
        <div class="ing-qty">${mq}${aq}</div>
      </div>`;
    }
  });

  document.getElementById('cardWrap').innerHTML = `
    <div class="hero-card">

      <div class="meal-img-wrap">
        <img class="meal-img" src="${img}" alt="${curMeal}" loading="lazy"
             onerror="this.style.display='none'">
        <div class="meal-img-overlay"></div>
        <div class="meal-img-content">
          <div class="meal-tag">🗓 ${m.tag}</div>
          <div class="meal-title">${curMeal}</div>
          <div class="meal-sub">${m.sub}</div>
        </div>
      </div>

      <div class="cook-tip">
        <span class="tip-icon">${m.tip.icon}</span>
        <div>
          <div class="tip-label">Chef's Tip</div>
          <div class="tip-body">${m.tip.text}</div>
        </div>
      </div>

      <div class="ing-section">
        <div class="ing-hd">Ingredients</div>
        ${ings}
      </div>

      <div class="totals-bar">
        <div class="totals-title">Tonight's Nutrition</div>
        <div class="totals-grid">
          <div class="tot mk">
            <div class="tot-stripe"></div>
            <div class="tot-val m">~${m.mk}</div>
            <div class="tot-lbl">💙 Mark<br>kcal</div>
          </div>
          <div class="tot al">
            <div class="tot-stripe"></div>
            <div class="tot-val a">~${m.ak}</div>
            <div class="tot-lbl">💗 Allie<br>kcal</div>
          </div>
          <div class="tot mk">
            <div class="tot-stripe"></div>
            <div class="tot-val m">${m.mp}g</div>
            <div class="tot-lbl">💙 Mark<br>protein</div>
          </div>
          <div class="tot al">
            <div class="tot-stripe"></div>
            <div class="tot-val a">${m.ap}g</div>
            <div class="tot-lbl">💗 Allie<br>protein</div>
          </div>
        </div>
      </div>

    </div>
    <div class="fn">Quantities match your spreadsheet ✦ Z</div>`;
}

buildDays();
pickDay(TODAY);
</script>
</body>
</html>
