<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Dinner — Mark & Allie</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f5f5f7;
  --glass:    rgba(0,0,0,0.04);
  --glass2:   rgba(0,0,0,0.07);
  --border:   rgba(0,0,0,0.09);
  --border2:  rgba(0,0,0,0.14);
  --text:     #1a1a2e;
  --muted:    rgba(26,26,46,0.5);
  --dim:      rgba(26,26,46,0.35);
  --mark:     #60a5fa;
  --allie:    #f472b6;
  --safe-t:   env(safe-area-inset-top,0px);
  --safe-b:   env(safe-area-inset-bottom,20px);
  /* meal colour palettes */
  --c1: #f97316; --c1b: #7c2d12;
  --c2: #a78bfa; --c2b: #3b1f6e;
  --c3: #34d399; --c3b: #064e3b;
  --c4: #fb923c; --c4b: #7c2d12;
  --c5: #fbbf24; --c5b: #78350f;
  --c6: #38bdf8; --c6b: #0c4a6e;
  --c7: #f87171; --c7b: #7f1d1d;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100svh;
  overflow-x:hidden;
}

/* ── GRAIN OVERLAY ── */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.25;
}

/* ── AMBIENT GLOW ── */
.glow{
  position:fixed;
  border-radius:50%;
  filter:blur(80px);
  pointer-events:none;
  z-index:0;
  transition:all 1.2s ease;
}
.glow1{width:400px;height:400px;top:-100px;right:-100px;background:rgba(249,115,22,0.07);}
.glow2{width:300px;height:300px;bottom:100px;left:-80px;background:rgba(167,139,250,0.06);}

/* ── HEADER ── */
.hdr{
  position:sticky;top:0;z-index:200;
  padding:calc(var(--safe-t) + 14px) 20px 12px;
  background:rgba(245,245,247,0.92);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;}
.hdr-left h1{
  font-family:'Playfair Display',serif;
  font-size:22px;letter-spacing:-.3px;
  background:linear-gradient(135deg,#1a1a2e 0%,rgba(26,26,46,.6) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hdr-left p{font-size:11px;color:var(--muted);margin-top:1px;font-weight:300;}
.today-badge{
  padding:5px 12px;border-radius:100px;
  background:var(--glass2);border:1px solid var(--border2);
  font-size:11px;font-weight:600;color:var(--text);
  white-space:nowrap;
}

/* ── DAY STRIP ── */
.days-outer{overflow-x:auto;scrollbar-width:none;padding:14px 16px 10px;}
.days-outer::-webkit-scrollbar{display:none;}
.days-row{display:flex;gap:8px;min-width:max-content;}

.day-btn{
  display:flex;flex-direction:column;align-items:center;
  padding:10px 14px;border-radius:16px;
  border:1px solid var(--border);
  background:var(--glass);
  cursor:pointer;transition:all .2s;
  font-family:'Outfit',sans-serif;
  position:relative;overflow:hidden;
}
.day-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,transparent 100%);
  opacity:0;transition:opacity .2s;
}
.day-btn:active{transform:scale(.94);}
.day-btn.active::before{opacity:1;}
.day-short{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;}
.day-num{font-size:10px;font-weight:400;color:var(--dim);margin-top:2px;}
.day-dot{width:4px;height:4px;border-radius:50%;margin-top:4px;background:transparent;transition:background .2s;}
.day-btn.today .day-short{color:var(--text);}
.day-btn.today .day-dot{background:var(--c1);}
.day-btn.active .day-short{color:#fff;}
.day-btn.active{border-color:rgba(0,0,0,.2);background:var(--glass2);}
.day-btn.active .day-dot{background:#fff;}

/* ── MEAL PICKER ── */
.picker-outer{padding:2px 16px 12px;}
.picker-scroll{overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.picker-scroll::-webkit-scrollbar{display:none;}
.picker-row{display:flex;gap:7px;min-width:max-content;}

.meal-chip{
  display:flex;align-items:center;gap:6px;
  padding:7px 13px;border-radius:100px;
  border:1px solid var(--border);
  background:var(--glass);
  cursor:pointer;transition:all .2s;
  font-family:'Outfit',sans-serif;
  font-size:12px;font-weight:500;color:var(--muted);
  white-space:nowrap;
}
.meal-chip:active{transform:scale(.95);}
.meal-chip.active{
  border-color:rgba(255,255,255,.25);
  background:var(--glass2);
  color:var(--text);
}
.meal-chip-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* ── HERO CARD ── */
.main{padding:0 14px calc(var(--safe-b) + 20px);position:relative;z-index:1;}
.card-wrap{max-width:480px;margin:0 auto;}

.hero-card{
  border-radius:24px;
  overflow:hidden;
  border:1px solid var(--border2);
  animation:cardIn .35s cubic-bezier(.2,0,.2,1);
  position:relative;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(20px) scale(.98)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* dynamic colour hero */
.hero-banner{
  padding:22px 22px 18px;
  position:relative;overflow:hidden;
  min-height:130px;
  display:flex;flex-direction:column;justify-content:flex-end;
}
.hero-banner::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--meal-c1) 0%,var(--meal-c2) 100%);
  opacity:.18;
}
.hero-banner::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 0%,rgba(8,10,15,.9) 100%);
}
.hero-emoji{
  position:absolute;top:16px;right:18px;
  font-size:56px;opacity:.35;
  filter:drop-shadow(0 0 20px var(--meal-c1));
  z-index:1;
}
.hero-tag{
  position:relative;z-index:2;
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:100px;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.18);
  font-size:10px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:rgba(255,255,255,.8);
  margin-bottom:8px;width:fit-content;
}
.hero-title{
  font-family:'Playfair Display',serif;
  font-size:24px;line-height:1.15;
  position:relative;z-index:2;
  text-shadow:0 2px 20px rgba(0,0,0,.5);
}
.hero-sub{
  font-size:12px;color:rgba(255,255,255,.55);
  margin-top:4px;font-weight:300;font-style:italic;
  position:relative;z-index:2;line-height:1.4;
}

/* cook tip */
.cook-tip{
  margin:0;padding:12px 18px;
  background:rgba(0,0,0,.03);
  border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;gap:10px;
}
.tip-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.tip-text{font-size:12px;color:rgba(26,26,46,.6);line-height:1.5;font-weight:300;}
.tip-text strong{display:block;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:rgba(26,26,46,.4);margin-bottom:2px;font-weight:600;}

/* ingredients */
.ing-section{background:#ffffff;}
.ing-hd{
  padding:12px 18px 4px;
  font-size:9px;text-transform:uppercase;letter-spacing:2px;
  color:var(--dim);font-weight:700;
}

.ing-row{
  padding:10px 18px;
  display:flex;justify-content:space-between;align-items:flex-start;gap:12px;
}
.ing-row:active{background:rgba(255,255,255,.03);}
.ing-name{flex:1;font-size:13.5px;color:rgba(26,26,46,.75);line-height:1.35;font-weight:300;}
.ing-name strong{font-weight:600;color:var(--text);}
.ing-only{display:block;font-size:10px;color:var(--dim);margin-top:2px;}
.ing-qty{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
.qty{font-size:13px;font-weight:700;white-space:nowrap;}
.qty.m{color:var(--mark);}
.qty.a{color:var(--allie);}

/* raw/cooked */
.rc-wrap{
  margin:2px 14px 6px 16px;
  border-radius:0 14px 14px 0;
  border-left:2px solid var(--meal-c1,var(--c1));
  background:rgba(0,0,0,.03);
  overflow:hidden;
.rc-head{
  padding:7px 14px 5px;
  font-size:9px;text-transform:uppercase;letter-spacing:1.5px;
  font-weight:700;color:var(--meal-c1,var(--c1));
}
.rc-row{
  padding:5px 14px 6px;
  display:flex;justify-content:space-between;align-items:baseline;
  border-top:1px solid rgba(0,0,0,.06);
}
.rc-who{font-size:11px;color:var(--muted);font-weight:400;}
.rc-right{text-align:right;}
.rc-raw{font-size:13px;font-weight:700;display:block;}
.rc-raw.m{color:var(--mark);}
.rc-raw.a{color:var(--allie);}
.rc-cooked{font-size:12px;color:#555;display:block;font-weight:700;}

.sep{height:1px;background:rgba(0,0,0,.06);margin:0 18px;}

/* totals */
.totals-bar{
  padding:14px 16px;
  background:rgba(0,0,0,.03);
  border-top:1px solid var(--border);
  display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;
}
.tot{
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:12px;padding:10px 6px;
  text-align:center;
  position:relative;overflow:hidden;
}
.tot::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
}
.tot.mk::before{background:linear-gradient(90deg,var(--mark),transparent);}
.tot.al::before{background:linear-gradient(90deg,var(--allie),transparent);}
.tot-val{font-size:16px;font-weight:700;line-height:1;}
.tot-val.m{color:var(--mark);}
.tot-val.a{color:var(--allie);}
.tot-lbl{font-size:9px;color:var(--dim);margin-top:4px;text-transform:uppercase;letter-spacing:.5px;line-height:1.3;}

/* empty */
.empty{
  text-align:center;padding:80px 30px;
  max-width:480px;margin:0 auto;
}
.empty-icon{font-size:64px;display:block;margin-bottom:16px;opacity:.7;}
.empty h2{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:8px;}
.empty p{font-size:14px;color:var(--muted);font-weight:300;line-height:1.6;}

.fn{text-align:center;padding:10px 0 2px;font-size:10px;color:var(--dim);font-style:italic;max-width:480px;margin:0 auto;letter-spacing:.5px;}
</style>
</head>

    ings:[
      {n:'Wholemeal tortillas (24g each)',m:'2 (48g)',a:'2 (48g)'},
      {n:'Chicken breast (cooked, sliced)',m:'150g cooked',a:'120g cooked'},
      {n:'Reduced fat cheese (grated)',m:'20g',a:'15g'},
      {n:'Capsicum (sliced)',m:'40g',a:'40g'},
      {n:'Spinach',m:'20g',a:'20g'},
      {n:'Tomato (diced)',m:'30g',a:'30g'},
      {n:'Greek yoghurt (topping)',m:'30g',a:'30g'},
    ]
  },
};

const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const PLAN={
  Monday:   {def:'Chicken Mince + Rice',opts:['Chicken Mince + Rice','Mediterranean Chicken','Slow Cook Roast Beef','Baked Chicken Risotto','Tortilla Boats']},
  Tuesday:  {def:'Roast Chicken + Air Fry Potatoes + Salad',opts:['Roast Chicken + Air Fry Potatoes + Salad','Mediterranean Chicken','Slow Cook Roast Beef','Baked Chicken Risotto','Tortilla Boats']},
  Wednesday:{def:'Chicken Stir Fry + Soba Noodles',opts:['Chicken Stir Fry + Soba Noodles','Mediterranean Chicken','Slow Cook Roast Beef','Baked Chicken Risotto','Tortilla Boats']},
  Thursday: {def:'Scrambled Eggs + Sourdough',opts:['Scrambled Eggs + Sourdough','Egg Wrap','Eggs + Smashed Avo','Mediterranean Chicken','Slow Cook Roast Beef','Baked Chicken Risotto','Tortilla Boats']},
  Friday:   {def:'Chicken Mince + Rice',opts:['Chicken Mince + Rice','Mediterranean Chicken','Slow Cook Roast Beef','Baked Chicken Risotto','Tortilla Boats']},
  Saturday: {def:'Roast Chicken + Corn, Beans & Carrot',opts:['Roast Chicken + Corn, Beans & Carrot','Mediterranean Chicken','Slow Cook Roast Beef','Baked Chicken Risotto','Tortilla Boats']},
  Sunday:   {def:'Scrambled Eggs + Sourdough',opts:['Scrambled Eggs + Sourdough','Egg Wrap','Eggs + Smashed Avo','Mediterranean Chicken','Slow Cook Roast Beef','Baked Chicken Risotto','Tortilla Boats']},
};

const TODAY=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()];
let curDay=null,curMeal=null;

// day number within month
const todayDate = new Date();

function buildDays(){
  const row = document.getElementById('daysRow');
  row.innerHTML = DAYS.map((d,i)=>{
    const date = new Date(); date.setDate(date.getDate()-(new Date().getDay()==0?6:new Date().getDay()-1)+i);
    const dn = date.getDate();
    return `<button class="day-btn${d===TODAY?' today':''}" onclick="pickDay('${d}')">
      <span class="day-short">${d.slice(0,3)}</span>
      <span class="day-num">${dn}</span>
      <span class="day-dot"></span>
    </button>`;
  }).join('');
  document.getElementById('todayBadge').textContent = TODAY;
  document.getElementById('subline').textContent = 'What\'s for dinner tonight?';
}

function pickDay(d){
  curDay=d; curMeal=PLAN[d].def;
  document.querySelectorAll('.day-btn').forEach((el,i)=>el.classList.toggle('active',DAYS[i]===d));
  document.querySelectorAll('.day-btn')[DAYS.indexOf(d)]?.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  document.getElementById('pickerOuter').style.display='block';
  buildPicker(); buildCard();
}

function buildPicker(){
  const opts=PLAN[curDay].opts;
  document.getElementById('pickerRow').innerHTML=opts.map(o=>{
    const [c1]=COLOURS[o]||['#fff'];
    const short=o.length>24?o.split(' ').slice(0,3).join(' ')+'…':o;
    return `<button class="meal-chip${o===curMeal?' active':''}" onclick="pickMeal('${o.replace(/'/g,"\\'")}')">
      <span class="meal-chip-dot" style="background:${c1}${o===curMeal?'':'55'}"></span>
      ${M[o].e} ${short}
    </button>`;
  }).join('');
}

function pickMeal(meal){curMeal=meal;buildPicker();buildCard();}

function setGlow(c1){
  document.getElementById('glow1').style.background=`${c1}20`;
}

function buildCard(){
  const m=M[curMeal]; if(!m) return;
  const [c1,c2]=COLOURS[curMeal]||['#f97316','#7c2d12'];
  setGlow(c1);

  let ings='';
  m.ings.forEach((ing,i)=>{
    if(i>0) ings+=`<div class="sep"></div>`;
    if(ing.rc){
      ings+=`
        <div class="ing-row"><div class="ing-name"><strong>${ing.n}</strong></div></div>
        <div class="rc-wrap" style="--meal-c1:${c1}">
          <div class="rc-head">⚖ Weigh raw — serve as cooked</div>
          <div class="rc-row">
            <span class="rc-who">💙 Mark</span>
            <div class="rc-right">
              <span class="rc-raw m">${ing.mr}</span>
              <span class="rc-cooked">${ing.mc}</span>
            </div>
          </div>
          <div class="rc-row">
            <span class="rc-who">💗 Allie</span>
            <div class="rc-right">
              <span class="rc-raw a">${ing.ar}</span>
              <span class="rc-cooked">${ing.ac}</span>
            </div>
          </div>
        </div>`;
    } else {
      const tag=ing.mo?`<span class="ing-only">💙 Mark only</span>`
               :ing.ao?`<span class="ing-only">💗 Allie only</span>`:'';
      const mq=ing.m&&!ing.ao?`<span class="qty m">💙 ${ing.m}</span>`:'';
      const aq=ing.a&&!ing.mo?`<span class="qty a">💗 ${ing.a}</span>`:'';
      ings+=`<div class="ing-row">
        <div class="ing-name">${ing.n}${tag}</div>
        <div class="ing-qty">${mq}${aq}</div>
      </div>`;
    }
  });

  document.getElementById('cardWrap').innerHTML=`
    <div class="hero-card" style="--meal-c1:${c1};--meal-c2:${c2}">
      <div class="hero-banner">
        <span class="hero-emoji">${m.e}</span>
        <div class="hero-tag">🗓 ${m.tag}</div>
        <div class="hero-title">${curMeal}</div>
        <div class="hero-sub">${m.sub}</div>
      </div>
      <div class="cook-tip">
        <span class="tip-icon">${m.tip.icon}</span>
        <div class="tip-text"><strong>Chef's tip</strong>${m.tip.text}</div>
      </div>
      <div class="ing-section">
        <div class="ing-hd">Ingredients</div>
        ${ings}
      </div>
      <div class="totals-bar">
        <div class="tot mk">
          <div class="tot-val m">~${m.mk}</div>
          <div class="tot-lbl">💙 Mark<br>kcal</div>
        </div>
        <div class="tot al">
          <div class="tot-val a">~${m.ak}</div>
          <div class="tot-lbl">💗 Allie<br>kcal</div>
        </div>
        <div class="tot mk">
          <div class="tot-val m">${m.mp}g</div>
          <div class="tot-lbl">💙 Mark<br>protein</div>
        </div>
        <div class="tot al">
          <div class="tot-val a">${m.ap}g</div>
          <div class="tot-lbl">💗 Allie<br>protein</div>
        </div>
      </div>
    </div>
    <div class="fn">Quantities match your spreadsheet ✦ Z</div>`;
}

buildDays();
pickDay(TODAY);
</script>
</body>
</html>
